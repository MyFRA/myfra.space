name: Build and Deploy

on:
  push:
    branches:
      - master

jobs:
  build-check:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm i --legacy-peer-deps

      - name: Run build
        run: npm run build

  docker-push:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: build-check 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/myfra-space:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/myfra-space:${{ github.sha }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker-push 

    steps:
      - name: SSH & Deploy VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            docker image pull ${{ secrets.DOCKERHUB_USERNAME }}/myfra-space:latest

            docker container stop myfra-space || true
            docker container rm myfra-space || true

            docker container run -d \
              --name myfra-space \
              --restart always \
              -p 6006:3000 \
              ${{ secrets.DOCKERHUB_USERNAME }}/myfra-space:latest